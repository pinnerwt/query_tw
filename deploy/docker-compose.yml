name: cuizhao
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cuizhao
      POSTGRES_PASSWORD: cuizhao
      POSTGRES_DB: cuizhao
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuizhao"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      DATABASE_URL: postgres://cuizhao:cuizhao@postgres:5432/cuizhao?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "1"
      STATIC_DIR: /app/dist
      PORT: "8080"
      ADMIN_BASIC_AUTH: ${ADMIN_BASIC_AUTH:-admin:changeme}
    networks:
      default: {}
      shared:
        aliases: [cuizhao-api]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  extractor:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.extractor
    environment:
      DATABASE_URL: postgres://cuizhao:cuizhao@postgres:5432/cuizhao?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scraper:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.scraper
    environment:
      REDIS_URL: redis://redis:6379/0
      QUERIES: ${SCRAPE_QUERIES:-徵才,找人}
      MIN_POSTED_AT: ${MIN_POSTED_AT:-}
      MAX_SCROLLS: ${MAX_SCROLLS:-200}
      MAX_CONSEC_KNOWN: ${MAX_CONSEC_KNOWN:-3}
      MAX_WALL_MINUTES: ${MAX_WALL_MINUTES:-10}
      STORAGE_STATE: /app/state.json
    volumes:
      - ../state.json:/app/state.json:ro
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["oneshot"]
    restart: "no"

volumes:
  pg_data:
  redis_data:

networks:
  default:
  shared:
    external: true
    name: deploy_default
