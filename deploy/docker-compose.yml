name: cuizhao
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cuizhao
      POSTGRES_PASSWORD: cuizhao
      POSTGRES_DB: cuizhao
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuizhao"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      DATABASE_URL: postgres://cuizhao:cuizhao@postgres:5432/cuizhao?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "1"
      STATIC_DIR: /app/dist
      PORT: "8080"
      ADMIN_BASIC_AUTH: ${ADMIN_BASIC_AUTH:-admin:changeme}
    networks:
      - default
      - traefik-web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-web"
      - "traefik.http.routers.cuizhao.rule=Host(`query.tw`)"
      - "traefik.http.routers.cuizhao.entrypoints=websecure"
      - "traefik.http.routers.cuizhao.tls.certresolver=letsencrypt"
      - "traefik.http.services.cuizhao.loadbalancer.server.port=8080"

  seeder:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.extractor
    command: ["--seed"]
    environment:
      DATABASE_URL: postgres://cuizhao:cuizhao@postgres:5432/cuizhao?sslmode=disable
      FIXTURES_PATH: /app/fixtures/jobs.json
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

volumes:
  pg_data:
  redis_data:

networks:
  default:
  traefik-web:
    external: true
    name: traefik-web
