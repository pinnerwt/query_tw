# Drop-in vhost for dev.query.tw -> cuizhao-api-dev:8080.
# Installed by deploy/deploy-monitor.sh into the existing nginx running
# from /home/ubuntu/tiayn-v2/deploy/nginx.conf. Self-signed cert is fine
# because Cloudflare proxies dev.query.tw and accepts self-signed origins.

# Marker line so the installer can locate and replace this block on
# subsequent deploys without duplicating it.
# CUIZHAO-DEV-NGINX-BLOCK-START
upstream cuizhao_api_dev {
    server cuizhao-api-dev:8080;
}

server {
    listen 80;
    listen 443 ssl;
    server_name dev.query.tw;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    client_max_body_size 4m;

    location / {
        proxy_pass http://cuizhao_api_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
# CUIZHAO-DEV-NGINX-BLOCK-END
