name: deploy

on:
  push:
    branches: [master, dev]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ubuntu@91.98.207.105
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web

      - name: Pick environment
        id: env
        run: |
          case "${GITHUB_REF##*/}" in
            master) echo "env=prod" >> "$GITHUB_OUTPUT" ;;
            dev)    echo "env=dev"  >> "$GITHUB_OUTPUT" ;;
            *)      echo "unexpected ref ${GITHUB_REF}"; exit 1 ;;
          esac

      - name: Deploy
        run: ./deploy/deploy-monitor.sh "${{ steps.env.outputs.env }}"
